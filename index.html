<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>절대 클릭하지 마세요</title>
</head>
<body>
    <button id="dontclick" onclick="dontclick()" style="font-size: 24px;">절대 이 버튼을 누르지 마세요</button><br>
    <p id="dontread" style="font-size: 24px;"></p><br>
    <img id="qrcode">
    <script>
        function dontclick() {
            var qrcode = document.getElementById("qrcode");
            var dontread = document.getElementById("dontread");
            qrcode.setAttribute("src", "qrcode.jpg");
            dontread.innerText = "절대로 아래 QR코드를 읽지 마세요.";
        }
    </script>
</body>
</html>
