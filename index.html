<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>절대 클릭하지 마세요</title>
</head>
<body>
    <button id="dontclick" onclick="dontclick()" style="font-size: 24px;">절대 이 버튼을 누르지 마세요</button><br>
    <a id="dontjoin" style="font-size: 24px;"></a><br>
    <script>
        function dontclick() {
            var dontjoin = document.getElementById("dontjoin");
            dontjoin.innerText = "절대로 이 디스코드 서버에 가입하지 마세요";
            dontjoin.setAttribute("href", "https://discord.gg/kJX2sBeVXr");
        }
    </script>
</body>
</html>
